<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2196f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NotePic">
<title>Note Picture</title>
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" id="icon-180">
<link rel="icon" type="image/png" sizes="32x32" id="icon-32">
<link rel="icon" type="image/png" sizes="192x192" id="icon-192">
<style>
:root{
  --blue:#2196f3;--blue-dark:#1565c0;--blue-light:#e3f2fd;
  --red:#e53935;--red-light:#ffebee;
  --gray:#757575;--gray-light:#f5f5f5;
  --border:#e0e0e0;--text:#212121;--text2:#616161;
  --radius:14px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f0f4f8;color:var(--text);
  min-height:100dvh;display:flex;flex-direction:column;
  overscroll-behavior:none;
}
header{
  background:var(--blue);color:#fff;
  padding:calc(12px + var(--safe-top)) 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{width:32px;height:32px;border-radius:8px;object-fit:cover;}
header h1{font-size:18px;font-weight:600;letter-spacing:.3px;}
.tab-btns{display:flex;gap:6px;}
.tab-btn{
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);
  border-radius:20px;color:#fff;font-size:12px;font-weight:500;
  padding:5px 12px;cursor:pointer;transition:background .15s;
}
.tab-btn.active{background:#fff;color:var(--blue);border-color:#fff;}
main{flex:1;overflow-y:auto;}
.screen{display:none;padding:14px 14px calc(20px + var(--safe-bottom));}
.screen.active{display:block;}
.camera-wrap{
  background:#000;border-radius:var(--radius);overflow:hidden;
  aspect-ratio:4/3;position:relative;width:100%;
}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#canvas{display:none;}
.cam-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:flex-end;padding:12px;
  background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 50%);
}
.cam-controls{display:flex;align-items:center;justify-content:space-between;}
.cam-side-btn{
  background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);
  border-radius:24px;color:#fff;font-size:12px;font-weight:500;
  padding:7px 13px;cursor:pointer;display:flex;align-items:center;gap:5px;
}
.shutter{
  width:62px;height:62px;border-radius:50%;background:#fff;
  border:4px solid rgba(255,255,255,.55);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s;box-shadow:0 0 0 3px rgba(255,255,255,.3);
}
.shutter:active{transform:scale(.93);}
.shutter svg{width:28px;height:28px;}
.no-cam{
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;background:#1a1a2e;
  border-radius:var(--radius);aspect-ratio:4/3;
  color:#aaa;font-size:14px;text-align:center;padding:20px;
}
.no-cam svg{width:48px;height:48px;opacity:.5;}
#preview-section{display:none;margin-bottom:12px;}
#preview-section.show{display:block;}
.preview-label{
  font-size:12px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;
}
.preview-img-wrap{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;}
#preview-img{width:100%;display:block;border-radius:var(--radius);}
.preview-meta{
  background:rgba(0,0,0,.62);position:absolute;bottom:0;left:0;right:0;
  padding:8px 12px;font-size:11px;color:#fff;line-height:1.6;
}
.preview-actions{display:flex;gap:8px;margin-top:8px;}
.btn-retake{
  flex:1;background:#fff;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-weight:500;
  padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-retake:active{background:var(--gray-light);}
.note-section{margin-top:12px;}
.note-section label{
  font-size:12px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;
}
#note-input{
  width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;font-size:15px;font-family:inherit;resize:none;
  min-height:72px;background:#fff;color:var(--text);outline:none;
  transition:border-color .15s;
}
#note-input:focus{border-color:var(--blue);}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.meta-badge{
  background:var(--blue-light);color:var(--blue-dark);border-radius:20px;
  font-size:11px;font-weight:500;padding:4px 10px;
  display:flex;align-items:center;gap:4px;max-width:100%;word-break:break-all;
}
.meta-badge svg{width:13px;height:13px;flex-shrink:0;}
.meta-badge.gps-err{background:#fff3e0;color:#e65100;}
.btn-save{
  width:100%;background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:600;
  margin-top:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:background .15s,transform .1s;
}
.btn-save:active{background:var(--blue-dark);transform:scale(.98);}
.btn-save:disabled{background:#90caf9;cursor:not-allowed;}
#gallery-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;min-height:36px;}
#gallery-count{font-size:14px;font-weight:600;color:var(--text);}
/* normal mode header right */
.btn-select-mode{
  background:var(--blue-light);border:1.5px solid #90caf9;border-radius:20px;
  color:var(--blue-dark);font-size:12px;font-weight:500;padding:5px 14px;
  cursor:pointer;display:flex;align-items:center;gap:5px;
}
.btn-select-mode:active{background:#bbdefb;}
/* select mode header */
#sel-header{display:none;align-items:center;justify-content:space-between;margin-bottom:12px;}
#sel-header.show{display:flex;}
.btn-cancel-sel{
  background:#fff;border:1.5px solid var(--border);border-radius:20px;
  color:var(--text);font-size:12px;font-weight:500;padding:5px 14px;cursor:pointer;
}
.btn-cancel-sel:active{background:var(--gray-light);}
#sel-count-badge{
  background:var(--blue);color:#fff;border-radius:20px;
  font-size:12px;font-weight:600;padding:5px 14px;
}
.btn-sel-all{
  background:#fff;border:1.5px solid var(--border);border-radius:20px;
  color:var(--text2);font-size:12px;font-weight:500;padding:5px 14px;cursor:pointer;
}
.btn-sel-all:active{background:var(--gray-light);}
/* card select state */
.gallery-card.sel-active{cursor:pointer;}
.gallery-card.selected{border:2.5px solid var(--blue);}
.thumb-wrap{position:relative;}
.sel-check{
  display:none;position:absolute;top:7px;left:7px;
  width:24px;height:24px;border-radius:50%;
  border:2.5px solid #fff;background:rgba(0,0,0,.28);
  align-items:center;justify-content:center;z-index:2;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.sel-check svg{width:13px;height:13px;stroke:#fff;}
.gallery-card.sel-active .sel-check{display:flex;}
.gallery-card.selected .sel-check{background:var(--blue);border-color:var(--blue);}
.sel-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(33,150,243,.18);pointer-events:none;
}
.gallery-card.selected .sel-overlay{display:block;}
/* bottom action bar */
#bulk-bar{
  display:none;
  position:sticky;bottom:calc(14px + var(--safe-bottom));
  background:#fff;border:1.5px solid var(--border);
  border-radius:16px;padding:10px;
  gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);
  margin-top:12px;
}
#bulk-bar.show{display:flex;}
.bulk-btn{
  flex:1;border-radius:10px;font-size:12px;font-weight:500;
  padding:10px 4px;display:flex;flex-direction:column;
  align-items:center;gap:4px;cursor:pointer;border:1.5px solid var(--border);
  background:var(--gray-light);color:var(--text2);transition:opacity .12s;
}
.bulk-btn svg{width:20px;height:20px;}
.bulk-btn:active{opacity:.7;}
.bulk-btn.green{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32;}
.bulk-btn.blue{background:var(--blue-light);border-color:#90caf9;color:var(--blue-dark);}
.bulk-btn.red{background:var(--red-light);border-color:#ef9a9a;color:var(--red);}
#gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
}
.gallery-empty{
  text-align:center;padding:60px 20px;color:var(--gray);
  font-size:14px;grid-column:1/-1;
}
.gallery-empty svg{width:56px;height:56px;opacity:.3;display:block;margin:0 auto 12px;}
.gallery-card{
  background:#fff;border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);
  display:flex;flex-direction:column;
}
.gallery-thumb{aspect-ratio:4/3;object-fit:cover;width:100%;display:block;background:#ddd;}
.gallery-info{padding:8px 10px 10px;flex:1;display:flex;flex-direction:column;gap:4px;}
.gallery-note{
  font-size:13px;color:var(--text);line-height:1.4;word-break:break-word;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.gallery-note.empty{color:var(--gray);font-style:italic;}
.gallery-ts{font-size:10px;color:var(--gray);display:flex;align-items:center;gap:3px;margin-top:2px;}
.gallery-ts svg{width:11px;height:11px;}
.gallery-gps{font-size:10px;color:var(--blue);display:flex;align-items:center;gap:3px;word-break:break-all;text-decoration:none;}
.gallery-gps svg{width:11px;height:11px;flex-shrink:0;}
.gallery-gps.no-gps{color:var(--gray);}

/* Lightbox */
#lightbox{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.92);
  flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
#lightbox.open{display:flex;}
#lightbox-img{
  max-width:100%;max-height:70dvh;
  border-radius:var(--radius);object-fit:contain;
}
#lightbox-note{
  color:#fff;font-size:13px;line-height:1.5;
  margin-top:12px;text-align:center;max-width:340px;
}
#lightbox-meta{
  color:#aaa;font-size:11px;margin-top:6px;text-align:center;
}
#lightbox-close{
  position:absolute;top:calc(16px + var(--safe-top));right:16px;
  background:rgba(255,255,255,.15);border:none;border-radius:50%;
  width:38px;height:38px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;
}
#lightbox-close svg{width:20px;height:20px;}
#toast{
  position:fixed;bottom:calc(20px + var(--safe-bottom));
  left:50%;transform:translateX(-50%) translateY(80px);
  background:#323232;color:#fff;border-radius:24px;
  padding:10px 20px;font-size:13px;font-weight:500;
  z-index:999;transition:transform .25s ease,opacity .25s;
  opacity:0;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <img class="header-logo" id="hdr-logo" alt="NotePic">
    <h1>Note Picture</h1>
  </div>
  <div class="tab-btns">
    <button class="tab-btn active" id="tab-camera" onclick="switchTab('camera')">Camera</button>
    <button class="tab-btn" id="tab-gallery" onclick="switchTab('gallery')">Gallery</button>
  </div>
</header>
<main>
  <div class="screen active" id="screen-camera">
    <div class="camera-wrap" id="cam-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="cam-overlay">
        <div class="cam-controls">
          <button class="cam-side-btn" onclick="flipCamera()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M20 7h-9m4-4-4 4 4 4M4 17h9m-4 4 4-4-4-4"/></svg>Flip
          </button>
          <button class="shutter" onclick="capturePhoto()" aria-label="Take photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M2 8.5A2.5 2.5 0 0 1 4.5 6h.5l1.5-2h11l1.5 2h.5A2.5 2.5 0 0 1 22 8.5v9A2.5 2.5 0 0 1 19.5 20h-15A2.5 2.5 0 0 1 2 17.5z"/></svg>
          </button>
          <div style="width:80px"></div>
        </div>
      </div>
    </div>
    <div class="no-cam" id="no-cam">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8.5A2.5 2.5 0 0 1 4.5 6h.5l1.5-2h11l1.5 2h.5A2.5 2.5 0 0 1 22 8.5v9A2.5 2.5 0 0 1 19.5 20h-15A2.5 2.5 0 0 1 2 17.5z"/><circle cx="12" cy="12" r="5"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
      Camera unavailable.<br>Check browser permissions.
    </div>
    <canvas id="canvas"></canvas>
    <div id="preview-section">
      <p class="preview-label" style="margin-top:12px;">Preview</p>
      <div class="preview-img-wrap">
        <img id="preview-img" alt="Captured photo">
        <div class="preview-meta" id="preview-meta"></div>
      </div>
      <div class="preview-actions">
        <button class="btn-retake" onclick="retakePhoto()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>Retake
        </button>
      </div>
    </div>
    <div class="note-section">
      <label for="note-input">Note</label>
      <textarea id="note-input" placeholder="Type a note for this photo…" rows="3"></textarea>
      <div class="meta-row">
        <span class="meta-badge" id="badge-time">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>—
        </span>
        <span class="meta-badge" id="badge-gps">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>Getting GPS…
        </span>
      </div>
    </div>
    <button class="btn-save" id="save-btn" onclick="saveEntry()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M2 8.5A2.5 2.5 0 0 1 4.5 6h.5l1.5-2h11l1.5 2h.5A2.5 2.5 0 0 1 22 8.5v9A2.5 2.5 0 0 1 19.5 20h-15A2.5 2.5 0 0 1 2 17.5z"/><circle cx="12" cy="12" r="5"/></svg>Capture a photo first
    </button>
  </div>
  <div class="screen" id="screen-gallery">
    <!-- normal header -->
    <div id="gallery-header">
      <span id="gallery-count">Gallery</span>
      <button class="btn-select-mode" onclick="enterSelectMode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Select
      </button>
    </div>
    <!-- select mode header -->
    <div id="sel-header">
      <button class="btn-cancel-sel" onclick="exitSelectMode()">Cancel</button>
      <span id="sel-count-badge">0 selected</span>
      <button class="btn-sel-all" id="btn-sel-all" onclick="toggleSelectAll()">Select All</button>
    </div>
    <div id="gallery-grid"></div>
    <!-- bulk action bar -->
    <div id="bulk-bar">
      <button class="bulk-btn green" onclick="bulkDownload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Save
      </button>
      <button class="bulk-btn blue" onclick="bulkShare()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <button class="bulk-btn red" onclick="bulkDelete()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Delete
      </button>
    </div>
  </div>
</main>
<div id="toast"></div>

<div id="lightbox" role="dialog" aria-modal="true" onclick="closeLightbox(event)">
  <button id="lightbox-close" onclick="closeLightbox()" aria-label="Close">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <img id="lightbox-img" alt="Full photo">
  <div id="lightbox-note"></div>
  <div id="lightbox-meta"></div>

(function(){
  const m={name:"Note Picture",short_name:"NotePic",
    description:"Capture photos with notes, timestamp and GPS.",
    start_url:"./index.html",display:"standalone",orientation:"portrait",
    background_color:"#ffffff",theme_color:"#2196f3",
    icons:[{src:ICON_192,sizes:"192x192",type:"image/png",purpose:"any maskable"},
           {src:ICON_512,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  const blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(blob);
  document.getElementById('icon-32').href=ICON_32;
  document.getElementById('icon-32').setAttribute('sizes','32x32');
  document.getElementById('icon-180').href=ICON_180;
  document.getElementById('icon-180').setAttribute('sizes','180x180');
  document.getElementById('icon-192').href=ICON_192;
  document.getElementById('icon-192').setAttribute('sizes','192x192');
  document.getElementById('hdr-logo').src=ICON_32;
})();

if('serviceWorker' in navigator){
  const sw=`const C='notepic-v1';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
}

let stream=null,facingMode='environment';
let capturedDataUrl=null,capturedTimestamp=null,capturedGps=null,gpsStatus='pending';

const DB_KEY='notepic_entries';
function loadEntries(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'[]');}catch{return[];}}
function saveEntries(a){localStorage.setItem(DB_KEY,JSON.stringify(a));}

function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='gallery') renderGallery();
}

async function startCamera(){
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1280},height:{ideal:960}},audio:false});
    document.getElementById('video').srcObject=stream;
    document.getElementById('cam-wrap').style.display='block';
    document.getElementById('no-cam').style.display='none';
  }catch(e){
    document.getElementById('cam-wrap').style.display='none';
    document.getElementById('no-cam').style.display='flex';
  }
}

function flipCamera(){facingMode=(facingMode==='environment')?'user':'environment';startCamera();}

function capturePhoto(){
  const v=document.getElementById('video'),c=document.getElementById('canvas');
  if(!v.videoWidth){showToast('Camera not ready');return;}
  c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  capturedDataUrl=c.toDataURL('image/jpeg',0.88);
  capturedTimestamp=new Date();
  document.getElementById('preview-img').src=capturedDataUrl;
  updatePreviewMeta();
  document.getElementById('preview-section').classList.add('show');
  document.getElementById('preview-section').scrollIntoView({behavior:'smooth',block:'start'});
  updateSaveBtn(true);
}

function updatePreviewMeta(){
  const ts=capturedTimestamp?formatTS(capturedTimestamp):'—';
  let g='';
  if(capturedGps) g=`<br>&#128205; ${capturedGps.lat.toFixed(5)}, ${capturedGps.lng.toFixed(5)} (±${Math.round(capturedGps.acc)}m)`;
  else if(gpsStatus==='pending') g='<br>&#128205; Acquiring GPS…';
  else g='<br>&#128205; GPS unavailable';
  document.getElementById('preview-meta').innerHTML=`&#128336; ${ts}${g}`;
}

function retakePhoto(){
  capturedDataUrl=null;
  document.getElementById('preview-section').classList.remove('show');
  document.getElementById('preview-img').src='';
  updateSaveBtn(false);
  document.getElementById('cam-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

function updateSaveBtn(has){
  const b=document.getElementById('save-btn');
  const saveIco=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`;
  const camIco=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M2 8.5A2.5 2.5 0 0 1 4.5 6h.5l1.5-2h11l1.5 2h.5A2.5 2.5 0 0 1 22 8.5v9A2.5 2.5 0 0 1 19.5 20h-15A2.5 2.5 0 0 1 2 17.5z"/><circle cx="12" cy="12" r="5"/></svg>`;
  b.disabled=!has;
  b.innerHTML=has?`${saveIco} Save to Gallery`:`${camIco} Capture a photo first`;
}

function startGPS(){
  if(!navigator.geolocation){gpsStatus='error';updateGpsBadge();return;}
  navigator.geolocation.getCurrentPosition(
    p=>{capturedGps={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy};gpsStatus='ok';updateGpsBadge();if(capturedDataUrl)updatePreviewMeta();},
    e=>{gpsStatus=(e.code===1)?'denied':'error';capturedGps=null;updateGpsBadge();if(capturedDataUrl)updatePreviewMeta();},
    {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
  );
}

function updateGpsBadge(){
  const b=document.getElementById('badge-gps');
  const pin=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`;
  if(gpsStatus==='ok'&&capturedGps){b.className='meta-badge';b.innerHTML=`${pin} ${capturedGps.lat.toFixed(5)}, ${capturedGps.lng.toFixed(5)} ±${Math.round(capturedGps.acc)}m`;}
  else if(gpsStatus==='pending'){b.className='meta-badge';b.innerHTML=`${pin} Getting GPS…`;}
  else{b.className='meta-badge gps-err';b.innerHTML=`${pin} GPS ${gpsStatus==='denied'?'permission denied':'unavailable'}`;}
}

function startTimestampTick(){
  const ico=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  function tick(){document.getElementById('badge-time').innerHTML=`${ico} ${formatTS(new Date())}`;setTimeout(tick,1000);}
  tick();
}

function saveEntry(){
  if(!capturedDataUrl)return;
  const note=document.getElementById('note-input').value.trim();
  const entries=loadEntries();
  entries.unshift({id:Date.now(),photo:capturedDataUrl,note,
    timestamp:capturedTimestamp?capturedTimestamp.toISOString():new Date().toISOString(),
    gps:capturedGps?{...capturedGps}:null});
  saveEntries(entries);
  document.getElementById('note-input').value='';
  retakePhoto();
  showToast('Saved to gallery ✓');
  setTimeout(()=>switchTab('gallery'),600);
}

function renderGallery(){
  const entries=loadEntries();
  const grid=document.getElementById('gallery-grid');
  document.getElementById('gallery-count').textContent=`Gallery (${entries.length})`;
  if(!entries.length){
    grid.innerHTML=`<div class="gallery-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 8.5A2.5 2.5 0 0 1 4.5 6h.5l1.5-2h11l1.5 2h.5A2.5 2.5 0 0 1 22 8.5v9A2.5 2.5 0 0 1 19.5 20h-15A2.5 2.5 0 0 1 2 17.5z"/><circle cx="12" cy="12" r="5"/></svg>No photos yet.<br>Take one with the Camera tab.</div>`;
    return;
  }
  grid.innerHTML=entries.map(e=>{
    const ts=formatTS(new Date(e.timestamp));
    const noteHtml=e.note?`<span class="gallery-note">${escHtml(e.note)}</span>`:`<span class="gallery-note empty">No note</span>`;
    const gpsHtml=e.gps
      ?`<a class="gallery-gps" href="https://www.google.com/maps?q=${e.gps.lat},${e.gps.lng}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${e.gps.lat.toFixed(4)}, ${e.gps.lng.toFixed(4)}</a>`
      :`<span class="gallery-gps no-gps"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>No GPS</span>`;
    return `<div class="gallery-card" id="card-${e.id}" onclick="cardClick(${e.id})" style="cursor:pointer;">
      <div class="thumb-wrap">
        <img class="gallery-thumb" src="${e.photo}" alt="Photo" loading="lazy">
        <div class="sel-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="sel-overlay"></div>
      </div>
      <div class="gallery-info">
        ${noteHtml}
        <div class="gallery-ts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${ts}</div>
        ${gpsHtml}
      </div>
    </div>`;
  }).join('');
}

function viewEntry(id){
  const e=loadEntries().find(e=>e.id===id);
  if(!e)return;
  document.getElementById('lightbox-img').src=e.photo;
  const noteEl=document.getElementById('lightbox-note');
  noteEl.textContent=e.note||'';
  noteEl.style.display=e.note?'block':'none';
  const ts=formatTS(new Date(e.timestamp));
  const gps=e.gps?` · ${e.gps.lat.toFixed(4)}, ${e.gps.lng.toFixed(4)}`:'';
  document.getElementById('lightbox-meta').textContent=ts+gps;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(ev){
  if(ev&&ev.target!==document.getElementById('lightbox')&&ev.target!==document.getElementById('lightbox-close')&&!ev.target.closest('#lightbox-close'))return;
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src='';
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox({target:document.getElementById('lightbox')});});

function downloadEntry(id){
  const e=loadEntries().find(e=>e.id===id);
  if(!e)return;
  const ts=new Date(e.timestamp);
  const fname=`NotePic_${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,'0')}${String(ts.getDate()).padStart(2,'0')}_${String(ts.getHours()).padStart(2,'0')}${String(ts.getMinutes()).padStart(2,'0')}${String(ts.getSeconds()).padStart(2,'0')}.jpg`;
  const a=document.createElement('a');
  a.href=e.photo;a.download=fname;a.click();
  showToast('Saved to device \u2713');
}

async function shareEntry(id){
  const e=loadEntries().find(e=>e.id===id);
  if(!e)return;
  const ts=formatTS(new Date(e.timestamp));
  const gpsLine=e.gps?`\n📍 ${e.gps.lat.toFixed(5)}, ${e.gps.lng.toFixed(5)} (±${Math.round(e.gps.acc)}m)`:'';
  const text=`${e.note?e.note+'\n':''}🕐 ${ts}${gpsLine}`;
  if(navigator.share&&navigator.canShare){
    try{
      const res=await fetch(e.photo);
      const blob=await res.blob();
      const file=new File([blob],'note-picture.jpg',{type:'image/jpeg'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Note Picture',text});
        return;
      }
    }catch(err){}
    try{await navigator.share({title:'Note Picture',text});return;}catch(err){}
  }
  // Fallback: copy text to clipboard
  try{
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard \u2713');
  }catch{
    showToast('Share not supported on this browser');
  }
}

// ── Select mode ──
let selMode=false;
let selIds=new Set();

function enterSelectMode(){
  selMode=true; selIds.clear();
  document.getElementById('gallery-header').style.display='none';
  document.getElementById('sel-header').classList.add('show');
  document.getElementById('bulk-bar').classList.add('show');
  document.querySelectorAll('.gallery-card').forEach(c=>c.classList.add('sel-active'));
  updateSelUI();
}

function exitSelectMode(){
  selMode=false; selIds.clear();
  document.getElementById('gallery-header').style.display='flex';
  document.getElementById('sel-header').classList.remove('show');
  document.getElementById('bulk-bar').classList.remove('show');
  document.querySelectorAll('.gallery-card').forEach(c=>{
    c.classList.remove('sel-active','selected');
  });
}

function cardClick(id){
  if(!selMode){viewEntry(id);return;}
  const card=document.getElementById('card-'+id);
  if(selIds.has(id)){selIds.delete(id);card.classList.remove('selected');}
  else{selIds.add(id);card.classList.add('selected');}
  updateSelUI();
}

function toggleSelectAll(){
  const all=loadEntries().map(e=>e.id);
  const allSelected=all.every(id=>selIds.has(id));
  if(allSelected){
    selIds.clear();
    document.querySelectorAll('.gallery-card').forEach(c=>c.classList.remove('selected'));
    document.getElementById('btn-sel-all').textContent='Select All';
  }else{
    all.forEach(id=>selIds.add(id));
    document.querySelectorAll('.gallery-card').forEach(c=>c.classList.add('selected'));
    document.getElementById('btn-sel-all').textContent='Deselect All';
  }
  updateSelUI();
}

function updateSelUI(){
  const n=selIds.size;
  document.getElementById('sel-count-badge').textContent=n===0?'None selected':`${n} selected`;
  const all=loadEntries().map(e=>e.id);
  const allSel=all.length>0&&all.every(id=>selIds.has(id));
  document.getElementById('btn-sel-all').textContent=allSel?'Deselect All':'Select All';
  const bar=document.getElementById('bulk-bar');
  bar.querySelectorAll('.bulk-btn').forEach(b=>b.style.opacity=n===0?'0.4':'1');
}

function bulkDelete(){
  if(!selIds.size){showToast('Nothing selected');return;}
  if(!confirm(`Delete ${selIds.size} photo${selIds.size>1?'s':''}? This cannot be undone.`))return;
  saveEntries(loadEntries().filter(e=>!selIds.has(e.id)));
  showToast(`Deleted ${selIds.size} photo${selIds.size>1?'s':''}`);
  exitSelectMode();
  renderGallery();
}

function bulkDownload(){
  if(!selIds.size){showToast('Nothing selected');return;}
  const entries=loadEntries().filter(e=>selIds.has(e.id));
  entries.forEach((e,i)=>{
    setTimeout(()=>{
      const ts=new Date(e.timestamp);
      const fname=`NotePic_${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,'0')}${String(ts.getDate()).padStart(2,'0')}_${String(ts.getHours()).padStart(2,'0')}${String(ts.getMinutes()).padStart(2,'0')}${String(ts.getSeconds()).padStart(2,'0')}.jpg`;
      const a=document.createElement('a');a.href=e.photo;a.download=fname;a.click();
    },i*400);
  });
  showToast(`Saving ${entries.length} photo${entries.length>1?'s':''}\u2026`);
}

async function bulkShare(){
  if(!selIds.size){showToast('Nothing selected');return;}
  const entries=loadEntries().filter(e=>selIds.has(e.id));
  if(entries.length===1){await shareEntry(entries[0].id);return;}
  // Multi: share text summary + try files
  const text=entries.map(e=>{
    const ts=formatTS(new Date(e.timestamp));
    const gps=e.gps?` | ${e.gps.lat.toFixed(5)},${e.gps.lng.toFixed(5)}`:'';
    return `${e.note?e.note:'(no note)'} | ${ts}${gps}`;
  }).join('\n');
  if(navigator.share){
    try{
      const files=[];
      for(const e of entries){
        const res=await fetch(e.photo);const blob=await res.blob();
        files.push(new File([blob],`notepic-${e.id}.jpg`,{type:'image/jpeg'}));
      }
      if(navigator.canShare&&navigator.canShare({files})){
        await navigator.share({files,title:'Note Picture',text});return;
      }
    }catch(err){}
    try{await navigator.share({title:'Note Picture',text});return;}catch(err){}
  }
  try{await navigator.clipboard.writeText(text);showToast('Copied to clipboard \u2713');}
  catch{showToast('Share not supported on this browser');}
}




function formatTS(d){
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
    +', '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

startCamera();startGPS();startTimestampTick();
</script>
